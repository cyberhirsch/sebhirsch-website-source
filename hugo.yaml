baseURL: '/'
title: Seb Hirsch - Motion Design & Visual Effects
languageCode: en-us
theme: 
  - tailbliss
  - gallerydeluxe
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
pagination:
  pagerSize: 1009
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Seb Hirsch
  authorimage: images/logo.png
  og_image: images/logo.png
  moto: "PROFESSOR FOR TIME-BASED MEDIA & 3D ANIMATION"
  description: "Emmy Award winning VFX Artist, Professor at Media University. Expert in 3D Animation, Photogrammetry, and Motion Design."
  disable_theme_toggle: true
  disable_stay_uptodate: true
  gallerydeluxe:
    shuffle: false
    reverse: false
    enable_exif: false

  p1:
    heading: "Visual Effects & 3D Animation"
    image: "images/portfolio/thumb_Showreel 2006.jpg"
    content:
      - text: "This showreel represents some of the visual effects work I've been fortunate to contribute to over the years. It includes shots from various projects where I played different roles, including work on 'Star Trek Into Darkness' and 'Game of Thrones'."
      - text: "I've had the chance to create set extensions and matte paintings for movies including 'The Ghostwriter' and 'Hotel Lux'. The reel also shows the wide range of my work from title animations to crowd simulations."
      - text: "While many of these shots were collaborative efforts with talented teams, I hope this gives a sense of the areas I've been able to work in and develop skills over time."
  p2:
    heading: "Professional Services"
    image: "images/portfolio/thumb_Berlin 36.jpg"
    content:
      - text: "Specialized in VFX creation, 3D modeling/animation, compositing, and technical direction. I also provide photogrammetry services including 3D scanning and digital asset creation for virtual sets and cultural heritage."
  p3:
    heading: "Selected Experience"
    content:
      - text: "Worked on blockbuster films and acclaimed TV series including The Avengers, Looper, and The Last Airbender."
    links:
      - text: View all projects
        url: "/projects/"
    logos:
      - identifier: got
        image: "images/portfolio/thumb_Game of Thrones.jpg"
        alt: "Game of Thrones"
      - identifier: star-trek
        image: "images/portfolio/thumb_Star Trek into Darkness.jpg"
        alt: "Star Trek Into Darkness"
      - identifier: avengers
        image: "images/portfolio/thumb_Avengers.jpg"
        alt: "The Avengers"
  p4:
    heading: "Top Projects"
    content:
      - text: "A selection of visual effects and motion design projects from over 15 years in the industry."
  p5:
    heading: "Get in Touch"
    content:
      - text: "Interested in technical direction, VFX consulting, or 3D animation workshops? Send me a message."
    action: "/contact/"
    label: "Email address"
    placeholder: "Enter your email"
    button: "Contact Me"

  social_media:
    github:
      enabled: true
      url: 'https://github.com/cyberhirsch'
    linkedin:
      enabled: true
      url: 'https://www.linkedin.com/in/cyberhirsch'
    vimeo:
      enabled: true
      url: 'https://vimeo.com/cyberhirsch'
    artstation:
      enabled: true
      url: 'https://www.artstation.com/cyberhirsch'
    sketchfab:
      enabled: true
      url: 'https://sketchfab.com/cyberhirsch'
    imdb:
      enabled: true
      url: 'http://www.imdb.com/name/nm1677414/?ref_=nv_sr_1'

