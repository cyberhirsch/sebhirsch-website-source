enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
relativeURLs: true
pagination:
  pagerSize: 1009
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Seb Hirsch
  authorimage: images/logo.png
  og_image: images/logo.png
  moto: "PROFESSOR FOR TIME-BASED MEDIA & 3D ANIMATION"
  description: "Emmy Award winning VFX Artist and Professor for Time-Based Media. Expert in 3D Animation, Generative AI (ComfyUI), Photogrammetry, and Motion Design. Worked on Game of Thrones, Star Trek, and The Avengers."
  hero_image: "images/seb-hirsch-portrait.jpg"
  disable_theme_toggle: true
  disable_stay_uptodate: true
  gallerydeluxe:
    shuffle: false
    reverse: false
    enable_exif: false

  p1:
    heading: "Cinematic Visual Effects & 3D Animation"
    image: "images/vfx-production-greenscreen.jpg"
    content:
      - text: "With over two decades of experience in high-end production, I've had the privilege of contributing to some of the most iconic films and television series in modern cinema. My work as a VFX Artist and Supervisor includes contributions to 'Game of Thrones', 'Star Trek Into Darkness', 'The Avengers', 'Looper', and 'The Last Airbender'."
      - text: "I specialize in the creation of complex digital environments, set extensions, and matte paintings, bringing a deep understanding of lighting, shading, and cinematic composition to every frame. My approach bridges the gap between traditional film craft and the next generation of creative technologies."
  p2:
    heading: "Professional Services & Research"
    image: "images/portfolio/thumb_Berlin 36.jpg"
    content:
      - text: "I provide specialized technical direction and creative services in VFX, 3D modeling, and generative production pipelines. As a researcher and industry consultant, I stay at the absolute forefront of machine learning and generative AI, with a specific focus on Multimodal Diffusion Transformers (MMDiT) and node-based workflows in ComfyUI."
      - text: "My work focuses on solving the critical challenges of modern production: bridging the 'Uncanny Valley' and ensuring visual continuity in AI-generated moving images. I also offer expert photogrammetry services, 3D scanning, and digital asset creation for virtual sets and cultural heritage preservation."
  p3:
    heading: "Selected Clients & Studio Experience"
    content:
      - text: "I have collaborated with world-class VFX houses and production studios for over two decades. My studio experience includes work with Pixomondo, Rise FX, Scanline VFX, Seaside Productions, and United Senses."
      - text: "From Emmy-winning television series to blockbuster features, I've served as a VFX Artist, Supervisor, and Consultant on more than 30 international productions."
    links:
      - text: View full career timeline
        url: "/about/"
    logos:
      - identifier: got
        image: "images/portfolio/thumb_Game of Thrones.jpg"
        alt: "Game of Thrones"
      - identifier: star-trek
        image: "images/portfolio/thumb_Star Trek into Darkness.jpg"
        alt: "Star Trek Into Darkness"
      - identifier: avengers
        image: "images/portfolio/thumb_Avengers.jpg"
        alt: "The Avengers"
  p4:
    heading: "Featured Projects"
    content:
      - text: "A selection of visual effects, motion design, and generative research projects from my filmography of over 30 international titles."
  p5:
    heading: "Get in Touch"
    content:
      - text: "Interested in technical direction, VFX consulting, or 3D animation workshops? Send me a message."
    action: "/contact/"
    label: "Email address"
    placeholder: "Enter your email"
    button: "Contact Me"

  social_media:
    github:
      enabled: true
      url: 'https://github.com/cyberhirsch'
    linkedin:
      enabled: true
      url: 'https://www.linkedin.com/in/cyberhirsch'
    vimeo:
      enabled: true
      url: 'https://vimeo.com/cyberhirsch'
    artstation:
      enabled: true
      url: 'https://www.artstation.com/cyberhirsch'
    sketchfab:
      enabled: true
      url: 'https://sketchfab.com/cyberhirsch'
    imdb:
      enabled: true
      url: 'http://www.imdb.com/name/nm1677414/?ref_=nv_sr_1'
    youtube:
      enabled: true
      url: 'https://www.youtube.com/@cyberhirsch'

