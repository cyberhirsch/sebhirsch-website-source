{{define "main"}}
<article>
    <header class="mb-4 bg-primary-600">
        <h1 class="py-8 text-5xl font-black text-center text-white capitalize">
            {{ .Title }}
        </h1>
    </header>
    <!-- " {{.Content}}" pulls from the markdown content of the corresponding _index.md -->
    <div class="px-6 pt-6 pb-16 mx-auto prose prose-h1:text-2xl dark:text-white max-w-none !max-w-7xl">
        {{.Content}}
    </div>
</article>
{{end}}
