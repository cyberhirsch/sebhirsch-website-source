{{ define "main" }}
<main>
    <article>
        <header class="mb-4 bg-primary-600">
            <h1 class="py-8 text-5xl font-black text-center text-white capitalize">
                {{ .Title }}
            </h1>
        </header>

        {{ with .Content }}
        <div class="px-6 mx-auto mt-8 mb-12 max-w-5xl prose dark:text-white">
            {{ . }}
        </div>
        {{ end }}

        <div class="px-4 mx-auto max-w-7xl">
            <div class="grid gap-8 mx-auto mt-12 mb-24 lg:max-w-none md:grid-cols-3">
                {{ range .Pages.ByDate.Reverse }}
                {{ partial "post-tile.html" . }}
                {{ end }}
            </div>
        </div>
    </article>
</main>
{{ end }}
